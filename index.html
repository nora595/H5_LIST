<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>LINSY BPS Mall · Product List (H5)</title>
  <style>:root {
  --primary: #19c792;
  --accent: #2bb8a3;
  --text: #1a1a1a;
  --muted: #999;
  --line: #eee;
  --bg: #f5f5f5;
  --chip-bg: #f0f0f0;
  --card: #fff;
  --more-bg: #8fd4ef;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  height: 100%;
  background: var(--card);
  color: var(--text);
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior: none;
}

button, input { font: inherit; border: none; background: none; }
img { display: block; max-width: 100%; }

.app {
  min-height: 100%;
  min-height: 100dvh;
  display: flex;
  flex-direction: column;
  max-width: 430px;
  margin: 0 auto;
  background: var(--card);
  position: relative;
}

/* Status bar */
.status-bar {
  height: 44px;
  padding: 12px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 15px;
  font-weight: 600;
  background: #fff;
  flex-shrink: 0;
}

.status-icons { font-size: 12px; letter-spacing: 1px; }

/* Header */
.nav-bar {
  height: 48px;
  display: grid;
  grid-template-columns: 44px 1fr 88px;
  align-items: center;
  padding: 0 12px;
  background: #fff;
  flex-shrink: 0;
}

.nav-title {
  text-align: center;
  font-size: 17px;
  font-weight: 700;
}

.nav-btn {
  width: 36px;
  height: 36px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-size: 22px;
  color: #333;
  cursor: pointer;
}

.nav-right {
  display: flex;
  justify-content: flex-end;
}

.nav-pill {
  display: flex;
  align-items: center;
  gap: 8px;
  border: 1px solid #e0e0e0;
  border-radius: 20px;
  padding: 5px 12px;
  font-size: 15px;
  color: #333;
}

.nav-pill .dot-icon { font-size: 16px; letter-spacing: 1px; }
.nav-pill .ring-icon { font-size: 18px; }

/* Search */
.search-row {
  padding: 8px 16px 10px;
  background: #fff;
  flex-shrink: 0;
}

.search-box {
  display: flex;
  align-items: center;
  background: var(--bg);
  border-radius: 999px;
  height: 40px;
  padding: 0 14px;
  gap: 8px;
}

.search-box input {
  flex: 1;
  outline: none;
  font-size: 15px;
  color: var(--text);
}

.search-box input::placeholder { color: #bbb; }

.search-icon {
  color: #333;
  font-size: 18px;
  flex-shrink: 0;
}

/* Tabs */
.tab-row {
  display: flex;
  justify-content: center;
  gap: 32px;
  padding: 0 16px;
  background: #fff;
  flex-shrink: 0;
}

.tab-btn {
  padding: 10px 0 12px;
  font-size: 16px;
  color: var(--muted);
  cursor: pointer;
  position: relative;
}

.tab-btn.active {
  color: var(--text);
  font-weight: 700;
}

.tab-btn.active::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 3px;
  background: var(--text);
  border-radius: 2px;
}

/* Filter chips */
.chip-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 16px;
  overflow-x: auto;
  scrollbar-width: none;
  background: #fff;
  flex-shrink: 0;
}

.chip-row::-webkit-scrollbar { display: none; }

.filter-chip {
  padding: 7px 14px;
  border-radius: 999px;
  font-size: 13px;
  color: #666;
  background: var(--chip-bg);
  white-space: nowrap;
  flex-shrink: 0;
  cursor: pointer;
}

.filter-chip.active {
  background: #fff;
  color: var(--text);
  font-weight: 600;
  border: 1px solid var(--text);
}

.chip-menu {
  margin-left: auto;
  font-size: 18px;
  color: #333;
  cursor: pointer;
  flex-shrink: 0;
  padding: 4px;
}

/* Category layout */
.category-layout {
  display: grid;
  grid-template-columns: 108px 1fr;
  flex: 1;
  min-height: 0;
  background: #fff;
}

.cat-sidebar {
  background: var(--bg);
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
}

.cat-side-item {
  display: block;
  width: 100%;
  text-align: left;
  padding: 16px 10px 16px 14px;
  font-size: 13px;
  color: #888;
  cursor: pointer;
  position: relative;
  line-height: 1.35;
}

.cat-side-item.active {
  color: var(--text);
  font-weight: 600;
  background: #fff;
}

.cat-side-item.active::before {
  content: "";
  position: absolute;
  left: 0;
  top: 12px;
  bottom: 12px;
  width: 3px;
  background: var(--primary);
  border-radius: 0 2px 2px 0;
}

.subcat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 20px 14px;
  padding: 16px 14px;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  align-content: start;
}

.subcat-item {
  cursor: pointer;
  text-align: center;
}

.subcat-img {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 12px;
  object-fit: cover;
  background: #eee;
  margin-bottom: 10px;
}

.subcat-name {
  font-size: 13px;
  color: var(--text);
  line-height: 1.3;
}

/* Scroll body */
.scroll-body {
  flex: 1;
  overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  background: var(--bg);
  min-height: 0;
}

.product-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  padding: 12px;
}

/* Product card */
.product-card {
  background: transparent;
  cursor: pointer;
}

.card-img {
  position: relative;
  border-radius: 12px;
  overflow: hidden;
  aspect-ratio: 1;
  background: #eee;
  margin-bottom: 8px;
}

.product-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.thumb-glass {
  position: absolute;
  left: 8px;
  right: 8px;
  bottom: 8px;
  display: flex;
  align-items: center;
  gap: 4px;
  padding: 6px 8px;
  border-radius: 8px;
  background: rgba(255, 255, 255, 0.55);
  backdrop-filter: blur(8px);
  -webkit-backdrop-filter: blur(8px);
}

.swatch {
  width: 24px;
  height: 24px;
  border-radius: 4px;
  object-fit: cover;
  border: 2px solid transparent;
  flex-shrink: 0;
}

.swatch:first-child { border-color: #fff; box-shadow: 0 0 0 1px rgba(0,0,0,0.08); }

.swatch-more {
  margin-left: auto;
  min-width: 24px;
  height: 24px;
  border-radius: 4px;
  background: var(--more-bg);
  color: #fff;
  font-size: 10px;
  font-weight: 700;
  display: flex;
  align-items: center;
  justify-content: center;
  flex-shrink: 0;
}

.card-body { padding: 0 2px 4px; }

.card-title-row {
  display: flex;
  align-items: flex-start;
  gap: 6px;
  margin-bottom: 6px;
}

.card-title {
  flex: 1;
  font-size: 13px;
  line-height: 1.35;
  font-weight: 400;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
}

.fav-btn {
  font-size: 16px;
  color: #333;
  cursor: pointer;
  flex-shrink: 0;
  line-height: 1;
  padding-top: 1px;
}

.fav-btn.on { color: #e05c6a; }

.card-price {
  font-weight: 700;
  margin-bottom: 6px;
  line-height: 1;
}

.card-price .sym { font-size: 13px; }
.card-price .int { font-size: 18px; }
.card-price .dec { font-size: 13px; font-weight: 700; }

.card-logistics {
  display: flex;
  align-items: center;
  gap: 6px;
  font-size: 11px;
  color: var(--accent);
  margin-bottom: 4px;
}

.card-logistics .sep {
  color: #ddd;
  font-weight: 300;
}

.card-item {
  font-size: 10px;
  color: #bbb;
}

/* Bottom nav */
.bottom-nav {
  flex-shrink: 0;
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  height: calc(56px + env(safe-area-inset-bottom));
  padding-bottom: env(safe-area-inset-bottom);
  background: #fff;
  border-top: 1px solid var(--line);
}

.bottom-nav button {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2px;
  font-size: 10px;
  color: #999;
  cursor: pointer;
  padding-top: 4px;
}

.bottom-nav .nav-icon {
  font-size: 22px;
  line-height: 1;
}

.bottom-nav button.active {
  color: var(--primary);
  font-weight: 600;
}

.bottom-nav button.active .nav-icon { color: var(--primary); }

.toast {
  position: fixed;
  bottom: calc(72px + env(safe-area-inset-bottom));
  left: 50%;
  transform: translateX(-50%);
  background: rgba(0, 0, 0, 0.78);
  color: #fff;
  padding: 10px 20px;
  border-radius: 8px;
  font-size: 13px;
  z-index: 200;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.2s;
  max-width: 90vw;
  text-align: center;
}

.toast.show { opacity: 1; }

.page-main { display: flex; flex-direction: column; flex: 1; min-height: 0; }
.page-sub { display: flex; flex-direction: column; flex: 1; min-height: 0; }
</style>
</head>
<body>
  <div id="app">
    <noscript>
      <p style="padding:24px;font-family:sans-serif;">Please enable JavaScript to view this demo.</p>
    </noscript>
  </div>
  <script>window.BPS_LIST_DATA = (function () {
  const IMGS = [
    'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1617806117938-529d34949e8f?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1598300042247-d088f8ab3a91?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1567538096630-e0c55bd6374c?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1617103996701-966ffc08c9b0?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1540574163026-643ea20ade25?w=480&h=480&fit=crop',
  ];

  const SWATCHES = [
    'https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=64&h=64&fit=crop',
    'https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=64&h=64&fit=crop',
    'https://images.unsplash.com/photo-1617806117938-529d34949e8f?w=64&h=64&fit=crop',
    'https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=64&h=64&fit=crop',
  ];

  const PRODUCT_TITLE = 'Oxygen Wood Grain Sintered s...';

  const MAIN_CATS = [
    { id: 'linsy', name: 'Linsy Living' },
    { id: 'kids', name: 'Kids Furniture' },
    { id: 'inspire', name: 'Inspire Series' },
    { id: 'living', name: 'Living Room' },
    { id: 'dining', name: 'Dining Room' },
    { id: 'bedroom', name: 'Bedroom' },
    { id: 'study', name: 'Study' },
  ];

  const SUB_CATS = {
    living: [
      { name: 'Side Table', img: IMGS[10] },
      { name: 'Coffee Table', img: IMGS[0] },
      { name: 'Recliner Sofa', img: IMGS[1] },
      { name: 'Bean Bag Sofa', img: IMGS[2] },
      { name: 'Sofa Bed', img: IMGS[3] },
      { name: 'Storage Cabinet', img: IMGS[4], slug: 'storage-cabinet' },
      { name: 'Solid Wood Sofa', img: IMGS[5] },
      { name: 'Leather Sofa', img: IMGS[6] },
      { name: 'Fabric Sofa', img: IMGS[7] },
      { name: 'Sofa Accessories', img: IMGS[8] },
    ],
  };

  MAIN_CATS.forEach((c) => {
    if (!SUB_CATS[c.id]) SUB_CATS[c.id] = SUB_CATS.living;
  });

  const PRODUCTS = Array.from({ length: 20 }, (_, i) => {
    const imgIdx = i % IMGS.length;
    return {
      id: `p${i + 1}`,
      item: i === 0 ? 'LSC25ZH075892' : `LSC25ZH07589${i}`,
      price: 78.56,
      estDel: '7d',
      moq: 5,
      images: 12,
      image: IMGS[imgIdx],
      swatches: SWATCHES,
    };
  });

  return { PRODUCTS, MAIN_CATS, SUB_CATS, PRODUCT_TITLE };
})();

(function () {
  const { PRODUCTS, MAIN_CATS, SUB_CATS, PRODUCT_TITLE } = window.BPS_LIST_DATA;

  const ALL_CHIPS = ['New Arrivals', 'Bestsellers', '$101-$500', 'Wood'];
  const LIST_CHIPS = ['All Products', 'Entryway Cabinet', 'Shoe Cabinet'];

  const state = {
    view: 'main',
    tab: 'all',
    mainCat: 'living',
    subcategory: '',
    allChip: 0,
    listChip: 0,
    favorites: new Set(),
  };

  const $ = (sel, root = document) => root.querySelector(sel);
  const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

  function showToast(msg) {
    let el = $('#toast');
    if (!el) {
      el = document.createElement('div');
      el.id = 'toast';
      el.className = 'toast';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1800);
  }

  function formatPrice(n) {
    const [int, dec] = n.toFixed(2).split('.');
    return `<span class="sym">$</span><span class="int">${int}</span><span class="dec">.${dec} USD</span>`;
  }

  function renderStatusBar() {
    return `
      <div class="status-bar">
        <span>10:00</span>
        <span class="status-icons">▮▮▮ ▮▮▮▮ 📶 🔋</span>
      </div>
    `;
  }

  function renderNavBar(opts = {}) {
    const { title = 'Products', back = false } = opts;
    return `
      <div class="nav-bar">
        ${back
    ? '<button type="button" class="nav-btn" data-action="back" aria-label="Back">‹</button>'
    : '<span></span>'}
        <div class="nav-title">${title}</div>
        <div class="nav-right">
          <button type="button" class="nav-pill" aria-label="Menu">
            <span class="dot-icon">⋯</span>
            <span class="ring-icon">◎</span>
          </button>
        </div>
      </div>
    `;
  }

  function renderSearch(placeholder = 'search', value = '') {
    return `
      <div class="search-row">
        <div class="search-box">
          <input type="search" placeholder="${placeholder}" value="${value}" readonly />
          <span class="search-icon" aria-hidden="true">⌕</span>
        </div>
      </div>
    `;
  }

  function renderTabs() {
    return `
      <div class="tab-row">
        <button type="button" class="tab-btn ${state.tab === 'all' ? 'active' : ''}" data-tab="all">ALL</button>
        <button type="button" class="tab-btn ${state.tab === 'category' ? 'active' : ''}" data-tab="category">Category</button>
      </div>
    `;
  }

  function renderChips(chips, activeIdx, withMenu) {
    return `
      <div class="chip-row">
        ${chips.map((c, i) => `
          <button type="button" class="filter-chip ${i === activeIdx ? 'active' : ''}" data-chip="${i}">${c}</button>
        `).join('')}
        ${withMenu ? '<button type="button" class="chip-menu" data-action="filter-menu">☰</button>' : ''}
      </div>
    `;
  }

  function renderProductCard(p) {
    const fav = state.favorites.has(p.id);
    const swatches = p.swatches || [];
    return `
      <article class="product-card" data-id="${p.id}">
        <div class="card-img">
          <img class="product-img" src="${p.image}" alt="${PRODUCT_TITLE}" loading="lazy" />
          <div class="thumb-glass">
            ${swatches.map((s, i) => `<img class="swatch" src="${s}" alt="" />`).join('')}
            <span class="swatch-more">+${p.images}</span>
          </div>
        </div>
        <div class="card-body">
          <div class="card-title-row">
            <h3 class="card-title">${PRODUCT_TITLE}</h3>
            <button type="button" class="fav-btn ${fav ? 'on' : ''}" data-fav="${p.id}" aria-label="Wishlist">♡</button>
          </div>
          <div class="card-price">${formatPrice(p.price)}</div>
          <div class="card-logistics">
            <span>Est. Del: ${p.estDel}</span>
            <span class="sep">|</span>
            <span>MOQ: ${p.moq} pcs</span>
          </div>
          <div class="card-item">Item : ${p.item}</div>
        </div>
      </article>
    `;
  }

  function renderProductGrid(count) {
    return `
      <div class="product-grid">
        ${PRODUCTS.slice(0, count).map(renderProductCard).join('')}
      </div>
    `;
  }

  function renderBottomNav() {
    const items = [
      { id: 'home', label: 'Home', icon: '⌂' },
      { id: 'products', label: 'Products', icon: '▦' },
      { id: 'wishlist', label: 'Wishlist', icon: '♡' },
      { id: 'mine', label: 'Mine', icon: '☺' },
    ];
    return `
      <nav class="bottom-nav">
        ${items.map((item) => `
          <button type="button" class="${item.id === 'products' ? 'active' : ''}" data-nav="${item.id}">
            <span class="nav-icon">${item.icon}</span>
            <span>${item.label}</span>
          </button>
        `).join('')}
      </nav>
    `;
  }

  function renderCategoryPanel() {
    const subs = SUB_CATS[state.mainCat] || SUB_CATS.living;
    return `
      <div class="category-layout">
        <div class="cat-sidebar">
          ${MAIN_CATS.map((c) => `
            <button type="button" class="cat-side-item ${c.id === state.mainCat ? 'active' : ''}" data-main-cat="${c.id}">${c.name}</button>
          `).join('')}
        </div>
        <div class="subcat-grid">
          ${subs.map((s) => `
            <button type="button" class="subcat-item" data-subcat="${s.slug || ''}" data-subname="${s.name}">
              <img class="subcat-img" src="${s.img}" alt="${s.name}" />
              <div class="subcat-name">${s.name}</div>
            </button>
          `).join('')}
        </div>
      </div>
    `;
  }

  function renderMainPage() {
    const allContent = state.tab === 'all'
      ? `
        ${renderChips(ALL_CHIPS, state.allChip, false)}
        <div class="scroll-body">${renderProductGrid(20)}</div>
      `
      : renderCategoryPanel();

    return `
      <div class="page-main">
        ${renderStatusBar()}
        ${renderNavBar({ title: 'Products' })}
        ${renderSearch('search')}
        ${renderTabs()}
        ${allContent}
        ${renderBottomNav()}
      </div>
    `;
  }

  function renderSubcategoryPage() {
    return `
      <div class="page-sub">
        ${renderStatusBar()}
        ${renderNavBar({ title: state.subcategory, back: true })}
        ${renderSearch(state.subcategory, state.subcategory)}
        ${renderChips(LIST_CHIPS, state.listChip, true)}
        <div class="scroll-body">${renderProductGrid(20)}</div>
        ${renderBottomNav()}
      </div>
    `;
  }

  function render() {
    const root = $('#app');
    if (!root) return;
    root.innerHTML = `
      <div class="app">
        ${state.view === 'subcategory' ? renderSubcategoryPage() : renderMainPage()}
      </div>
    `;
    bindEvents();
  }

  function bindEvents() {
    $$('[data-tab]').forEach((btn) => {
      btn.addEventListener('click', () => {
        state.tab = btn.dataset.tab;
        render();
      });
    });

    $$('[data-main-cat]').forEach((btn) => {
      btn.addEventListener('click', () => {
        state.mainCat = btn.dataset.mainCat;
        render();
      });
    });

    $$('[data-subcat]').forEach((btn) => {
      btn.addEventListener('click', () => {
        state.view = 'subcategory';
        state.subcategory = btn.dataset.subname;
        state.listChip = 0;
        render();
        window.scrollTo(0, 0);
      });
    });

    $$('[data-action="back"]').forEach((btn) => {
      btn.addEventListener('click', () => {
        state.view = 'main';
        state.tab = 'category';
        render();
      });
    });

    $$('[data-chip]').forEach((chip) => {
      chip.addEventListener('click', () => {
        const idx = Number(chip.dataset.chip);
        if (state.view === 'subcategory') state.listChip = idx;
        else state.allChip = idx;
        render();
      });
    });

    $$('[data-fav]').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.fav;
        if (state.favorites.has(id)) state.favorites.delete(id);
        else state.favorites.add(id);
        btn.classList.toggle('on', state.favorites.has(id));
        showToast(state.favorites.has(id) ? 'Added to wishlist' : 'Removed from wishlist');
      });
    });

    $$('.product-card').forEach((card) => {
      card.addEventListener('click', () => showToast('Open product detail'));
    });

    $$('[data-nav]').forEach((btn) => {
      btn.addEventListener('click', () => {
        if (btn.dataset.nav === 'products') {
          state.view = 'main';
          render();
        } else {
          showToast(`${btn.dataset.nav} coming soon`);
        }
      });
    });

    $$('[data-action="filter-menu"]').forEach((btn) => {
      btn.addEventListener('click', () => showToast('Open filters'));
    });
  }

  function boot() {
    try { render(); }
    catch (err) {
      const root = document.getElementById('app');
      if (root) {
        root.innerHTML = `<pre style="padding:24px;color:#c0392b;white-space:pre-wrap;font:14px sans-serif;">${err.message}</pre>`;
      }
      console.error(err);
    }
  }

  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
</body>
</html>
