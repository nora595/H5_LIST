<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no" />
  <title>LINSY BPS Mall · Product List (H5)</title>
  <style>:root {
  --primary: #19c792;
  --primary-dark: #14a878;
  --primary-soft: rgba(25, 199, 146, 0.1);
  --text: #2b3136;
  --muted: #8a959c;
  --line: #e8edef;
  --bg: #f5f7f8;
  --card: #fff;
  --danger: #e05c6a;
}

* { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  min-height: 100%;
  background: #dfe3e8;
  color: var(--text);
  font-family: "Segoe UI", "PingFang SC", "Helvetica Neue", Arial, sans-serif;
  -webkit-font-smoothing: antialiased;
}

button, input { font: inherit; }
a { color: inherit; text-decoration: none; }
img { display: block; max-width: 100%; }

.demo-toolbar {
  position: fixed;
  top: 12px;
  left: 50%;
  transform: translateX(-50%);
  z-index: 999;
  display: flex;
  gap: 8px;
  background: rgba(43, 49, 54, 0.92);
  padding: 8px 10px;
  border-radius: 10px;
  box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
  max-width: calc(100vw - 24px);
  flex-wrap: wrap;
  justify-content: center;
}

.demo-toolbar a,
.demo-toolbar button {
  border: none;
  background: rgba(255, 255, 255, 0.12);
  color: #fff;
  padding: 6px 12px;
  border-radius: 6px;
  cursor: pointer;
  font-size: 12px;
  white-space: nowrap;
}

.demo-toolbar a.active,
.demo-toolbar button.active {
  background: var(--primary);
}

.showcase-wrap {
  min-height: 100vh;
  padding: 72px 24px 24px;
  display: flex;
  gap: 24px;
  justify-content: center;
  align-items: flex-start;
  flex-wrap: wrap;
}

.phone-frame {
  width: 375px;
  background: var(--card);
  border-radius: 28px;
  overflow: hidden;
  box-shadow: 0 20px 60px rgba(20, 45, 58, 0.18);
  position: relative;
  flex-shrink: 0;
}

.phone-frame.single {
  margin: 72px auto 24px;
}

.phone-label {
  text-align: center;
  font-size: 12px;
  color: #5a6570;
  margin-bottom: 10px;
  font-weight: 600;
}

.phone-shell {
  display: flex;
  flex-direction: column;
  min-height: 720px;
  max-height: 812px;
  position: relative;
  padding-bottom: calc(56px + env(safe-area-inset-bottom));
}

/* Status bar */
.status-bar {
  height: 44px;
  padding: 12px 20px 0;
  display: flex;
  align-items: center;
  justify-content: space-between;
  font-size: 15px;
  font-weight: 600;
  background: #fff;
}

.status-icons {
  display: flex;
  gap: 4px;
  font-size: 12px;
}

/* Nav */
.nav-bar {
  height: 48px;
  display: grid;
  grid-template-columns: 40px 1fr 72px;
  align-items: center;
  padding: 0 8px;
  border-bottom: 1px solid var(--line);
  background: #fff;
}

.nav-bar.back-mode {
  grid-template-columns: 40px 1fr 72px;
}

.nav-btn {
  width: 36px;
  height: 36px;
  border: none;
  background: transparent;
  font-size: 20px;
  color: #4a5560;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
}

.nav-title {
  text-align: center;
  font-size: 16px;
  font-weight: 600;
}

.nav-right {
  display: flex;
  justify-content: flex-end;
  gap: 2px;
}

.nav-pill {
  display: flex;
  align-items: center;
  gap: 6px;
  background: rgba(0, 0, 0, 0.06);
  border-radius: 20px;
  padding: 4px 10px;
  font-size: 14px;
}

/* Search */
.search-row {
  padding: 10px 14px;
  background: #fff;
}

.search-box {
  display: flex;
  align-items: center;
  background: #f0f2f4;
  border-radius: 999px;
  padding: 0 12px;
  height: 38px;
  gap: 8px;
}

.search-box input {
  flex: 1;
  border: none;
  background: transparent;
  outline: none;
  font-size: 14px;
  color: var(--text);
}

.search-icon {
  color: var(--muted);
  font-size: 16px;
}

/* Tabs */
.tab-row {
  display: flex;
  gap: 24px;
  padding: 0 16px;
  border-bottom: 1px solid var(--line);
  background: #fff;
}

.tab-btn {
  border: none;
  background: transparent;
  padding: 12px 0;
  font-size: 15px;
  color: var(--muted);
  cursor: pointer;
  position: relative;
}

.tab-btn.active {
  color: var(--text);
  font-weight: 700;
}

.tab-btn.active::after {
  content: "";
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: 2px;
  background: var(--text);
}

/* Filter chips */
.chip-row {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 10px 14px;
  overflow-x: auto;
  scrollbar-width: none;
  background: #fff;
  border-bottom: 1px solid var(--line);
}

.chip-row::-webkit-scrollbar { display: none; }

.filter-chip {
  border: 1px solid var(--line);
  background: #fff;
  padding: 6px 12px;
  border-radius: 999px;
  font-size: 12px;
  color: var(--muted);
  white-space: nowrap;
  flex-shrink: 0;
  cursor: pointer;
}

.filter-chip.active {
  border-color: var(--text);
  color: var(--text);
  font-weight: 600;
}

.chip-menu {
  margin-left: auto;
  border: none;
  background: transparent;
  font-size: 18px;
  color: var(--text);
  cursor: pointer;
  flex-shrink: 0;
}

/* Category split */
.category-layout {
  display: grid;
  grid-template-columns: 108px 1fr;
  flex: 1;
  min-height: 0;
  background: #fff;
}

.cat-sidebar {
  border-right: 1px solid var(--line);
  overflow-y: auto;
}

.cat-side-item {
  display: block;
  width: 100%;
  border: none;
  background: transparent;
  text-align: left;
  padding: 14px 10px 14px 14px;
  font-size: 13px;
  color: var(--muted);
  cursor: pointer;
  position: relative;
}

.cat-side-item.active {
  color: var(--text);
  font-weight: 600;
  background: #fafbfc;
}

.cat-side-item.active::before {
  content: "";
  position: absolute;
  left: 0;
  top: 10px;
  bottom: 10px;
  width: 3px;
  background: var(--primary);
  border-radius: 0 2px 2px 0;
}

.subcat-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 16px 12px;
  padding: 14px 12px;
  overflow-y: auto;
}

.subcat-item {
  border: none;
  background: transparent;
  cursor: pointer;
  text-align: center;
}

.subcat-img {
  width: 100%;
  aspect-ratio: 1;
  border-radius: 8px;
  object-fit: cover;
  background: #eef1f3;
  margin-bottom: 8px;
}

.subcat-name {
  font-size: 12px;
  color: #4a5560;
  line-height: 1.3;
}

/* Product grid */
.scroll-body {
  flex: 1;
  overflow-y: auto;
  background: var(--bg);
}

.product-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
  padding: 10px;
}

.product-card {
  background: #fff;
  border-radius: 8px;
  overflow: hidden;
}

.card-img {
  position: relative;
  aspect-ratio: 1;
  background: #eef1f3;
}

.product-img {
  width: 100%;
  height: 100%;
  object-fit: cover;
}

.thumb-row {
  position: absolute;
  bottom: 6px;
  left: 6px;
  right: 6px;
  display: flex;
  gap: 3px;
}

.dot-img {
  width: 22px;
  height: 22px;
  border-radius: 3px;
  object-fit: cover;
  border: 1px solid #fff;
}

.more {
  margin-left: auto;
  font-size: 10px;
  background: rgba(0, 0, 0, 0.55);
  color: #fff;
  padding: 2px 5px;
  border-radius: 3px;
  align-self: center;
}

.card-body { padding: 8px 8px 10px; }

.card-title-row {
  display: flex;
  justify-content: space-between;
  gap: 4px;
  margin-bottom: 4px;
}

.card-title {
  font-size: 12px;
  line-height: 1.35;
  display: -webkit-box;
  -webkit-line-clamp: 2;
  -webkit-box-orient: vertical;
  overflow: hidden;
  flex: 1;
}

.fav-btn {
  border: none;
  background: transparent;
  font-size: 14px;
  color: var(--muted);
  cursor: pointer;
  flex-shrink: 0;
}

.card-price {
  font-size: 14px;
  font-weight: 700;
  margin-bottom: 4px;
}

.card-meta {
  font-size: 10px;
  color: var(--muted);
  display: flex;
  flex-direction: column;
  gap: 1px;
}

/* Bottom nav */
.bottom-nav {
  position: absolute;
  left: 0;
  right: 0;
  bottom: 0;
  height: calc(56px + env(safe-area-inset-bottom));
  padding-bottom: env(safe-area-inset-bottom);
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  background: #fff;
  border-top: 1px solid var(--line);
}

.bottom-nav a,
.bottom-nav button {
  border: none;
  background: transparent;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 3px;
  font-size: 10px;
  color: var(--muted);
  cursor: pointer;
  padding-top: 6px;
}

.bottom-nav .nav-icon {
  font-size: 20px;
  line-height: 1;
}

.bottom-nav .active {
  color: var(--primary);
  font-weight: 600;
}

.bottom-nav .active .nav-icon {
  color: var(--primary);
}

.toast {
  position: fixed;
  bottom: 80px;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(43, 49, 54, 0.92);
  color: #fff;
  padding: 10px 18px;
  border-radius: 8px;
  font-size: 13px;
  z-index: 300;
  opacity: 0;
  pointer-events: none;
  transition: opacity 0.25s;
}

.toast.show { opacity: 1; }

@media (max-width: 820px) {
  .showcase-wrap {
    flex-direction: column;
    align-items: center;
  }
}
</style>
</head>
<body>
  <div id="app">
    <noscript>
      <p style="padding:24px;font-family:sans-serif;">Please enable JavaScript to view this demo.</p>
    </noscript>
  </div>
  <script>window.BPS_LIST_DATA = (function () {
  const IMGS = [
    'https://images.unsplash.com/photo-1555041469-a586c61ea9bc?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1505693416388-ac5ce068fe85?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1617806117938-529d34949e8f?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1616486338812-3dadae4b4ace?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1618221195710-dd6b41faaea6?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1631049307264-da0ec9d70304?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1598300042247-d088f8ab3a91?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1567538096630-e0c55bd6374c?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1617103996701-966ffc08c9b0?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1586023492125-27b2c045efd7?w=480&h=480&fit=crop',
    'https://images.unsplash.com/photo-1540574163026-643ea20ade25?w=480&h=480&fit=crop',
  ];

  const PRODUCT_TITLE = 'Oxygen Wood Grain Sintered s...';

  const MAIN_CATS = [
    { id: 'living', name: 'Living Room' },
    { id: 'linsy', name: 'Linsy Living' },
    { id: 'kids', name: 'Kids Furniture' },
    { id: 'inspire', name: 'Inspire Series' },
    { id: 'dining', name: 'Dining Room' },
    { id: 'bedroom', name: 'Bedroom' },
    { id: 'study', name: 'Study' },
  ];

  const SUB_CATS = {
    living: [
      { name: 'Side Table', img: IMGS[10] },
      { name: 'Coffee Table', img: IMGS[0] },
      { name: 'Recliner Sofa', img: IMGS[1] },
      { name: 'Bean Bag Sofa', img: IMGS[2] },
      { name: 'Sofa Bed', img: IMGS[3] },
      { name: 'Storage Cabinet', img: IMGS[4], slug: 'storage-cabinet' },
      { name: 'Solid Wood Sofa', img: IMGS[5] },
      { name: 'Leather Sofa', img: IMGS[6] },
      { name: 'Fabric Sofa', img: IMGS[7] },
      { name: 'Sofa Accessories', img: IMGS[8] },
    ],
  };

  const PRODUCTS = Array.from({ length: 20 }, (_, i) => {
    const imgIdx = i % IMGS.length;
    return {
      id: `p${i + 1}`,
      item: `LSC25ZH07589${i}`,
      price: 78.56,
      estDel: '7d',
      moq: 5,
      images: 12,
      image: IMGS[imgIdx],
      gallery: [
        IMGS[imgIdx],
        IMGS[(imgIdx + 1) % IMGS.length],
        IMGS[(imgIdx + 2) % IMGS.length],
      ],
    };
  });

  return { PRODUCTS, MAIN_CATS, SUB_CATS, PRODUCT_TITLE };
})();

(function () {
  const { PRODUCTS, MAIN_CATS, SUB_CATS, PRODUCT_TITLE } = window.BPS_LIST_DATA;

  const state = {
    mode: 'showcase',
    screen: 'all',
    mainCat: 'living',
    favorites: new Set(),
  };

  const $ = (sel, root = document) => root.querySelector(sel);
  const $$ = (sel, root = document) => Array.from(root.querySelectorAll(sel));

  function parseRoute() {
    const hash = location.hash.replace(/^#\/?/, '');
    if (hash === 'all' || hash === 'category' || hash === 'list') {
      state.mode = 'single';
      state.screen = hash;
    } else {
      state.mode = 'showcase';
    }
  }

  function showToast(msg) {
    let el = $('#toast');
    if (!el) {
      el = document.createElement('div');
      el.id = 'toast';
      el.className = 'toast';
      document.body.appendChild(el);
    }
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 1800);
  }

  function renderToolbar() {
    return `
      <div class="demo-toolbar">
        <a href="#/" class="${state.mode === 'showcase' ? 'active' : ''}">All Screens</a>
        <a href="#/all" class="${state.screen === 'all' && state.mode === 'single' ? 'active' : ''}">ALL List</a>
        <a href="#/category" class="${state.screen === 'category' && state.mode === 'single' ? 'active' : ''}">Category</a>
        <a href="#/list" class="${state.screen === 'list' && state.mode === 'single' ? 'active' : ''}">Subcategory List</a>
      </div>
    `;
  }

  function renderStatusBar() {
    return `
      <div class="status-bar">
        <span>10:00</span>
        <span class="status-icons">▮▮▮ ▮▮▮▮ 📶 🔋</span>
      </div>
    `;
  }

  function renderNavBar(opts = {}) {
    const { title = 'Products', back = false } = opts;
    return `
      <div class="nav-bar ${back ? 'back-mode' : ''}">
        ${back ? '<button type="button" class="nav-btn" data-action="back">‹</button>' : '<span></span>'}
        <div class="nav-title">${title}</div>
        <div class="nav-right">
          <button type="button" class="nav-btn">⋯</button>
          <button type="button" class="nav-btn nav-pill">◎</button>
        </div>
      </div>
    `;
  }

  function renderSearch(text = '') {
    return `
      <div class="search-row">
        <div class="search-box">
          <span class="search-icon">🔍</span>
          <input type="text" placeholder="${text ? '' : 'Search products'}" value="${text}" readonly />
          <span class="search-icon">🔍</span>
        </div>
      </div>
    `;
  }

  function renderTabs(active) {
    return `
      <div class="tab-row">
        <button type="button" class="tab-btn ${active === 'all' ? 'active' : ''}" data-screen="all">ALL</button>
        <button type="button" class="tab-btn ${active === 'category' ? 'active' : ''}" data-screen="category">Category</button>
      </div>
    `;
  }

  function renderChips(active, withMenu) {
    const chips = active === 'list'
      ? ['All Products', 'Entryway Cabinet', 'Shoe Cabinet']
      : ['New Arrivals', 'Bestsellers', '$101-$500', 'Wood...'];
    return `
      <div class="chip-row">
        ${chips.map((c, i) => `
          <button type="button" class="filter-chip ${i === 0 ? 'active' : ''}">${c}</button>
        `).join('')}
        ${withMenu ? '<button type="button" class="chip-menu">☰</button>' : ''}
      </div>
    `;
  }

  function renderProductCard(p) {
    const thumbs = p.gallery.slice(0, 3);
    return `
      <article class="product-card" data-id="${p.id}">
        <div class="card-img">
          <img class="product-img" src="${p.image}" alt="${PRODUCT_TITLE}" loading="lazy" />
          <div class="thumb-row">
            ${thumbs.map((t) => `<img class="dot-img" src="${t}" alt="" />`).join('')}
            <span class="more">+${p.images}</span>
          </div>
        </div>
        <div class="card-body">
          <div class="card-title-row">
            <h3 class="card-title">${PRODUCT_TITLE}</h3>
            <button type="button" class="fav-btn" data-fav="${p.id}">♡</button>
          </div>
          <div class="card-price">$${p.price.toFixed(2)} USD</div>
          <div class="card-meta">
            <span>Est. Del: ${p.estDel}</span>
            <span>MOQ: ${p.moq} pcs</span>
            <span>Item: ${p.item}</span>
          </div>
        </div>
      </article>
    `;
  }

  function renderProductGrid(count = 8) {
    return `
      <div class="product-grid">
        ${PRODUCTS.slice(0, count).map(renderProductCard).join('')}
      </div>
    `;
  }

  function renderBottomNav(active = 'products') {
    const items = [
      { id: 'home', label: 'Home', icon: '⌂' },
      { id: 'products', label: 'Products', icon: '▦' },
      { id: 'wishlist', label: 'Wishlist', icon: '♡' },
      { id: 'mine', label: 'Mine', icon: '☺' },
    ];
    return `
      <nav class="bottom-nav">
        ${items.map((item) => `
          <button type="button" class="${active === item.id ? 'active' : ''}">
            <span class="nav-icon">${item.icon}</span>
            <span>${item.label}</span>
          </button>
        `).join('')}
      </nav>
    `;
  }

  function renderAllScreen() {
    return `
      <div class="phone-shell">
        ${renderStatusBar()}
        ${renderNavBar({ title: 'Products' })}
        ${renderSearch()}
        ${renderTabs('all')}
        ${renderChips('all', false)}
        <div class="scroll-body">${renderProductGrid(10)}</div>
        ${renderBottomNav('products')}
      </div>
    `;
  }

  function renderCategoryScreen() {
    const subs = SUB_CATS.living || [];
    return `
      <div class="phone-shell">
        ${renderStatusBar()}
        ${renderNavBar({ title: 'Products' })}
        ${renderSearch()}
        ${renderTabs('category')}
        <div class="category-layout">
          <div class="cat-sidebar">
            ${MAIN_CATS.map((c) => `
              <button type="button" class="cat-side-item ${c.id === state.mainCat ? 'active' : ''}" data-main-cat="${c.id}">${c.name}</button>
            `).join('')}
          </div>
          <div class="subcat-grid">
            ${subs.map((s) => `
              <button type="button" class="subcat-item" data-subcat="${s.slug || ''}">
                <img class="subcat-img" src="${s.img}" alt="${s.name}" />
                <div class="subcat-name">${s.name}</div>
              </button>
            `).join('')}
          </div>
        </div>
        ${renderBottomNav('products')}
      </div>
    `;
  }

  function renderListScreen() {
    return `
      <div class="phone-shell">
        ${renderStatusBar()}
        ${renderNavBar({ title: 'Storage Cabinet', back: true })}
        ${renderSearch('Storage Cabinet')}
        ${renderChips('list', true)}
        <div class="scroll-body">${renderProductGrid(8)}</div>
        ${renderBottomNav('products')}
      </div>
    `;
  }

  function renderPhone(label, content) {
    return `
      <div>
        <div class="phone-label">${label}</div>
        <div class="phone-frame">${content}</div>
      </div>
    `;
  }

  function renderShowcase() {
    return `
      <div class="showcase-wrap">
        ${renderPhone('ALL List', renderAllScreen())}
        ${renderPhone('Category', renderCategoryScreen())}
        ${renderPhone('Subcategory List', renderListScreen())}
      </div>
    `;
  }

  function renderSingle() {
    let content = renderAllScreen();
    if (state.screen === 'category') content = renderCategoryScreen();
    if (state.screen === 'list') content = renderListScreen();
    return `<div class="phone-frame single">${content}</div>`;
  }

  function render() {
    parseRoute();
    $('#app').innerHTML = `
      ${renderToolbar()}
      ${state.mode === 'showcase' ? renderShowcase() : renderSingle()}
    `;
    bindEvents();
  }

  function bindEvents() {
    $$('[data-screen]').forEach((btn) => {
      btn.addEventListener('click', () => {
        location.hash = `#/${btn.dataset.screen}`;
      });
    });

    $$('[data-subcat]').forEach((btn) => {
      btn.addEventListener('click', () => {
        if (btn.dataset.subcat === 'storage-cabinet') location.hash = '#/list';
        else showToast('Open sub-category list');
      });
    });

    $$('[data-action="back"]').forEach((btn) => {
      btn.addEventListener('click', () => {
        location.hash = '#/category';
      });
    });

    $$('[data-fav]').forEach((btn) => {
      btn.addEventListener('click', (e) => {
        e.stopPropagation();
        const id = btn.dataset.fav;
        if (state.favorites.has(id)) state.favorites.delete(id);
        else state.favorites.add(id);
        showToast(state.favorites.has(id) ? 'Added to wishlist' : 'Removed');
      });
    });

    $$('.filter-chip').forEach((chip) => {
      chip.addEventListener('click', () => {
        chip.closest('.chip-row')?.querySelectorAll('.filter-chip').forEach((c) => c.classList.remove('active'));
        chip.classList.add('active');
      });
    });

    $$('[data-main-cat]').forEach((btn) => {
      btn.addEventListener('click', () => {
        state.mainCat = btn.dataset.mainCat;
        render();
      });
    });
  }
  function boot() {
    const root = document.getElementById('app');
    if (!root) return;
    window.addEventListener('hashchange', render);
    try { render(); }
    catch (err) {
      root.innerHTML = '<pre style="padding:24px;color:#c0392b;white-space:pre-wrap;font:14px/1.5 sans-serif;">Demo failed to load:\n' + err.message + '</pre>';
      console.error(err);
    }
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', boot);
  else boot();
})();
</script>
</body>
</html>
